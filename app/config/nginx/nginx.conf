user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # 后端API服务
    upstream backend_api {
        server academic-polisher_backend:5000;
    }

    # 前端服务
    upstream frontend_app {
        server academic-polisher_frontend:80;
    }

    # 前端开发服务器（开发环境）- Linux 不支持 host.docker.internal
    # upstream frontend_dev {
    #     server host.docker.internal:5173;
    # }

    server {
        listen 80;
        server_name localhost;

        # 日志
        access_log /var/log/nginx/academic-polisher_access.log main;
        error_log /var/log/nginx/academic-polisher_error.log warn;

        # SSE 流式推送专用（必须在 /api/ 之前匹配）
        location ~ ^/api/tasks/\d+/stream$ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            gzip off;

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # API 请求代理到后端
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 支持
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # 超时设置
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # 上传文件静态服务
        location /uploads/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
        }

        # 前端静态文件（生产环境）- 代理到前端容器
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # 开发环境配置（已禁用 - Linux 不支持 host.docker.internal）
    # server {
    #     listen 8080;
    #     server_name localhost;
    #     location /api/ {
    #         proxy_pass http://backend_api;
    #     }
    #     location / {
    #         proxy_pass http://frontend_dev;
    #     }
    # }
}
