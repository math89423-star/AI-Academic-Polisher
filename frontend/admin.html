<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理后台 - AI 极速学术润色系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background-color: #f1f5f9; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            overflow-y: auto !important; 
            padding-bottom: 50px; 
        }
        
        /* 顶部导航 */
        .admin-header { background: white; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.03); margin-bottom: 30px; }
        .admin-header h2 { margin: 0; font-size: 20px; color: #1e293b; }
        .logout-admin { background: #fee2e2; color: #ef4444; border: 1px solid #f87171; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .logout-admin:hover { background: #fca5a5; color: white; }

        .container-box { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .admin-layout { display: flex; gap: 25px; align-items: flex-start; }

        /* 左侧面板 */
        .sidebar { width: 360px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; flex-shrink: 0; }
        .sidebar h3 { margin-top: 0; color: #0f172a; border-bottom: 2px solid #3b82f6; display: inline-block; padding-bottom: 8px; margin-bottom: 20px; font-size: 16px;}
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; color: #64748b; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; font-size: 14px; box-sizing: border-box; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        #add-user-btn { width: 100%; padding: 12px; background-color: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        #add-user-btn:hover { background-color: #2563eb; }

        /* 右侧列表面板 */
        .main-content { flex: 1; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; overflow-x: auto; }
        .main-content h3 { margin-top: 0; color: #0f172a; font-size: 18px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 15px; table-layout: auto; }
        th, td { padding: 14px 15px; text-align: left; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
        th { background-color: #f8fafc; font-weight: 600; color: #475569; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        tr:hover td { background-color: #f8fafc; }
        
        .role-badge { padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
        .role-admin { background: #fee2e2; color: #dc2626; }
        .role-user { background: #dcfce3; color: #16a34a; }
        
        .api-select { padding: 6px 8px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 13px; outline: none; background: #fff; cursor: pointer; min-width: 180px; max-width: 220px; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .delete-btn:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div id="admin-login-container" class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
        <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 340px; text-align: center;">
            <h2 style="margin-top: 0; color: #1e293b;">管理员入口</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">系统高权限控制台</p>
            <input type="text" id="admin-username" placeholder="管理员账号" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; outline: none;">
            <input type="password" id="admin-password" placeholder="管理员密码" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; outline: none;">
            <button id="admin-login-btn" style="width: 100%; padding: 12px; background: #1e293b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px;">安全登录</button>
            <div id="admin-login-msg" style="color: #ef4444; margin-top: 15px; font-size: 13px;"></div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden">
        <div class="admin-header">
            <h2>⚙️ 系统管理控制台</h2>
            <div>
                <span style="font-size: 14px; color: #64748b; margin-right: 20px;">欢迎, <span id="current-admin-name" style="font-weight: bold; color: #1e293b;"></span></span>
                <button id="admin-logout-btn" class="logout-admin">安全退出</button>
            </div>
        </div>

        <div class="container-box">
            <div class="admin-layout">
                
                <div class="sidebar">
                    <h3>➕ 颁发新账号</h3>
                    <div class="form-group">
                        <label>分配用户名</label>
                        <input type="text" id="new-username" placeholder="输入用户的登录账号">
                    </div>
                    <div class="form-group">
                        <label>账号权限角色</label>
                        <select id="new-role">
                            <option value="user">👤 普通用户 (免密码登录)</option>
                            <option value="admin">👑 系统管理员 (需强制密码)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>绑定大模型 API 线路</label>
                        <select id="new-user-api-config">
                            <option value="">(正在加载线路...)</option>
                        </select>
                    </div>
                    <div class="form-group" id="pwd-group">
                        <label>设置管理员安全密码</label>
                        <input type="password" id="new-password" placeholder="请输入密码">
                    </div>
                    <button id="add-user-btn">生成并分配账号</button>

                    <hr style="margin: 30px 0; border: none; border-top: 1px dashed #cbd5e1;">
                    <h3>🔌 新增 API 线路</h3>
                    <div class="form-group">
                        <label>线路标识名</label>
                        <input type="text" id="new-api-name" placeholder="例如: 硅基 DeepSeek">
                    </div>
                    <div class="form-group">
                        <label>Base URL 接口地址</label>
                        <input type="text" id="new-api-base-url" placeholder="例如: https://api.siliconflow.cn/v1">
                    </div>
                    <div class="form-group">
                        <label>调用模型 (Model)</label>
                        <input type="text" id="new-api-model" placeholder="例如: deepseek-ai/DeepSeek-V3">
                    </div>
                    <div class="form-group">
                        <label>安全密钥 (API Key)</label>
                        <input type="password" id="new-api-key" placeholder="sk-...">
                    </div>
                    <button id="add-api-btn" style="width: 100%; padding: 12px; background-color: #10b981; color: white; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;">启用新线路</button>
                </div>
                
                <div class="main-content">
                    <h3>👥 全局用户监管列表</h3>
                    <div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center;">
                        <button id="batch-update-standard-btn" style="padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;">批量更换标准模式线路</button>
                        <button id="batch-update-strict-btn" style="padding: 8px 16px; background: #8b5cf6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;">批量更换极致模式线路</button>
                        <span id="selected-count" style="color: #64748b; font-size: 13px;">已选择 0 个用户</span>
                    </div>
                    <table style="margin-bottom: 40px;">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="select-all-users"></th>
                                <th style="min-width: 100px;">授权用户名</th>
                                <th style="min-width: 80px;">角色状态</th>
                                <th style="min-width: 200px;">标准模式线路</th>
                                <th style="min-width: 200px;">极致模式线路</th>
                                <th style="min-width: 90px;">任务调用量</th>
                                <th style="min-width: 90px;">危险操作</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body"></tbody>
                    </table>

                    <h3>🌐 大模型线路调度池</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>线路名称</th>
                                <th>模型版本 (Model)</th>
                                <th>接口地址 (Base URL)</th>
                                <th>危险操作</th>
                            </tr>
                        </thead>
                        <tbody id="api-table-body"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
