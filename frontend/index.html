<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 极速学术润色系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="login-container" class="container">
        <h2>系统登录</h2>
        <p>请输入您的授权用户名</p>
        <input type="text" id="username-input" placeholder="请输入用户名...">
        <button id="login-btn">验证登录</button>
        <div id="login-msg" class="msg"></div>
    </div>

    <div id="work-container" class="app-layout hidden">
        
        <div class="sidebar">
            <button id="new-task-btn" class="new-task-btn">+ 新建润色任务</button>
            <div id="history-list" class="history-list">
                </div>
        </div>

        <div class="main-workspace container" style="margin: 0; padding: 20px;">
            <div class="header" style="margin-bottom: 15px;">
                <h2 style="margin:0;">AI 极速学术润色系统</h2>
                <div class="user-info">
                    当前用户: <span id="display-username" style="margin-right: 15px; font-weight: bold;"></span>
                    <button id="logout-btn" class="text-btn">退出登录</button>
                </div>
            </div>

            <div class="settings-panel" style="margin-bottom: 15px;">
                <label>请选择处理模式：</label>
                <div class="radio-group">
                    <label><input type="radio" name="mode" value="zh" checked> 中文润色</label>
                    <label><input type="radio" name="mode" value="en"> 英文润色</label>
                </div>
            </div>

            <div class="editor-layout" style="flex:1;">
                <div class="editor-box">
                    <h3>原始输入</h3>
                    
                    <textarea id="original-text" placeholder="请在此粘贴需要润色的长篇文本..."></textarea>
                    
                    <div id="docx-info-box" class="hidden" style="flex: 1; flex-direction: column; align-items: center; justify-content: center; background-color: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 6px; margin-bottom: 15px;">
                        <div style="font-size: 48px; margin-bottom: 10px;">📄</div>
                        <div id="docx-filename" style="font-size: 16px; font-weight: bold; color: #334155; margin-bottom: 8px;">文档名称.docx</div>
                        <div style="font-size: 13px; color: #10b981; background: #d1fae5; padding: 4px 12px; border-radius: 12px;">Word 专用解析引擎已激活</div>
                    </div>

                    <div class="button-group">
                        <button id="polish-btn" class="primary-btn">开始极速润色</button>
                        
                        <input type="file" id="docx-file-input" accept=".docx" style="display: none;">
                        <button id="upload-docx-btn" class="primary-btn" style="background-color: #f59e0b; width: auto; margin-left: 10px;">📄 上传 Word</button>
                        
                        <button id="cancel-btn" class="danger-btn hidden">⏹ 终止任务</button>
                        <button id="resume-btn" class="primary-btn hidden" style="background-color: #10b981; width: auto; margin-left: 10px;">▶️ 继续执行</button>
                    </div>
                </div>

                <div class="editor-box">
                    <h3>润色结果 
                        <div style="display: flex; align-items: center;">
                            <span id="status-box" class="status-badge">待命</span>
                            <span id="server-msg" class="server-msg"></span>
                            <a id="download-result-btn" class="hidden" target="_blank" style="padding: 4px 10px; font-size: 13px; margin-left: 10px; background-color: #10b981; color: white; border-radius: 4px; text-decoration: none;">📥 下载文档</a>
                        </div>
                    </h3>
                    <textarea id="polished-text" class="result-box" readonly placeholder="润色结果将在这里流式呈现..."></textarea>
                </div>
            </div>

    <script src="js/main.js"></script>
</body>
</html>
