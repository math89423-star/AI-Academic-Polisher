<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 极速学术润色系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="login-container">
        <h2>系统登录</h2>
        <p style="color: #64748b; margin-top: 0;">请输入您的授权用户名</p>
        <input type="text" id="username-input" placeholder="请输入用户名...">
        <button id="login-btn">验证登录</button>
        <div id="login-msg" style="color: red; margin-top: 10px; font-size: 14px;"></div>
    </div>

    <div id="work-container" class="app-layout hidden">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <button id="new-task-btn" class="new-task-btn">+ 新建润色任务</button>
            </div>
            <div id="history-list" class="history-list">
                </div>
        </div>

        <div class="main-workspace">
            <div class="top-header">
                <h2 class="system-title">AI 极速学术润色系统</h2>
                <div class="user-info">
                    当前用户: <span id="display-username" style="font-weight: bold; color: #1e293b;"></span>
                    <button id="logout-btn" class="logout-btn">退出</button>
                </div>
            </div>

            <div class="comparison-region">
                
                <div class="editor-container">
                    <div class="box-header">
                        <h3>原始输入</h3>
                        <div>
                            <label style="margin-right: 10px; cursor: pointer; font-size: 13px;"><input type="radio" name="mode" value="zh" checked> 🇨🇳 中文润色</label>
                            <label style="cursor: pointer; font-size: 13px;"><input type="radio" name="mode" value="en"> 🇬🇧 英文润色</label>
                        </div>
                    </div>
                    
                    <div class="content-area">
                        <div id="docx-info-box" class="hidden">
                            <div style="font-size: 56px; margin-bottom: 10px;">📄</div>
                            <div id="docx-filename">文档名称.docx</div>
                            <div style="font-size: 13px; color: #10b981; background: #d1fae5; padding: 5px 15px; border-radius: 12px; font-weight: 500;">Word 专用解析引擎已激活</div>
                        </div>
                        
                        <textarea id="original-text" placeholder="请在此粘贴需要润色的长篇文本..."></textarea>
                    </div>
                    
                    <div class="bottom-control-bar">
                        <div id="strategy-selector-ui" class="strategy-selector">
                            <span>🤖 去AI化策略:</span>
                            <span id="strategy-container">
                                <span style="color: #94a3b8; font-size: 12px;">正在加载策略库...</span>
                            </span>
                        </div>
                        
                        <div class="button-group">
                            <button id="polish-btn" class="primary-btn">开始极速润色</button>
                            
                            <input type="file" id="docx-file-input" accept=".docx" style="display: none;">
                            <button id="upload-docx-btn" class="primary-btn" style="background-color: #f59e0b;">📄 上传 Word</button>
                            
                            <button id="cancel-btn" class="danger-btn hidden">⏹ 终止任务</button>
                            <button id="resume-btn" class="primary-btn hidden" style="background-color: #10b981;">▶️ 继续执行</button>
                        </div>
                    </div>
                </div>

                <div class="editor-container">
                    <div class="box-header">
                        <h3>润色结果</h3>
                        <div style="display: flex; align-items: center;">
                            <span id="status-box" class="status-badge">待命</span>
                            <span id="server-msg" class="server-msg"></span>
                            <a id="download-result-btn" class="hidden" target="_blank" style="padding: 4px 10px; font-size: 13px; margin-left: 10px; background-color: #10b981; color: white; border-radius: 4px; text-decoration: none; font-weight: 500;">📥 下载 Word</a>
                        </div>
                    </div>
                    <div class="content-area">
                        <textarea id="polished-text" class="result-box" readonly placeholder="润色结果将在这里流式输出..."></textarea>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
