version: '3.8'

services:
  # Nginx 网关
  nginx:
    image: nginx:alpine
    container_name: academic-polisher_nginx
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./app/config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - academic-polisher-network

  # 前端应用
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile.frontend
    container_name: academic-polisher_frontend
    restart: always
    networks:
      - academic-polisher-network

  # 后端应用
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile.backend
    container_name: academic-polisher_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - academic-polisher-network

  # MySQL 数据库
  mysql:
    image: m.daocloud.io/docker.io/library/mysql:8.0
    container_name: academic-polisher_mysql
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - .env
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - academic-polisher-network

  # Redis 缓存
  redis:
    image: redis:7.0-alpine
    container_name: academic-polisher_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
      - ./app/config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - academic-polisher-network

# 网络配置
networks:
  academic-polisher-network:
    driver: bridge

# 数据卷
volumes:
  mysql_data:
  redis_data:
